# Stake 世界杯赔率监控 Nginx 配置
# 部署路径示例：/etc/nginx/sites-available/stake-worldcup-odds
# 前端静态文件由 Nginx 直接托管，/api 与 /events 反代到后端 Node 服务。

upstream stake_odds_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name _;  # 改成你的域名，例如 odds.example.com

    client_max_body_size 1m;

    # 前端静态资源（vite build 产物）
    root /opt/stake-worldcup-odds-monitor/app/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://stake_odds_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SSE 实时推送：必须关闭缓冲，并放长读超时
    location /events {
        proxy_pass http://stake_odds_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }
}
